<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/bf403b57fc.js" crossorigin="anonymous"></script>
    <script type="module" src="src/main.js"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Pokémon web api</title>
</head>
<body>
    <div id="topsection">
        <header>Pokémon api stat page<img id="ball" src="images/pokeball.png" alt="header image" width="100" height="100"></header>
        <p id="belowheader">Select a Pokémon from the yellow drop down below to see they're stats.</p>
    </div>
        <select id="pokemon">
            <option value="pikachu">pikachu</option>
            <option value="charmander">charmander</option>
            <option value="squirtle">squirtle</option>
            <option value="bulbasaur">bulbasaur</option>
            <option value="machop">machop</option>
            <option value="weedle">weedle</option>
            <option value="rattata">rattata</option>
            <option value="caterpie">caterpie</option>
            <option value="Diglett">diglett</option>
            <option value="Primeape">Primeape</option>
        </select>
        <img id="img" alt="pokemon image">
    <main id="themain">
        
        <section id="a">
            <h4>First ability<i class="fa-brands fa-superpowers"></i></h4>
            <div id="ability1"></div>
        </section>

        <section id="b">
            <h4>Second ability<i class="fa-brands fa-superpowers"></i></h4>
            <div id="ability2"></div>
        </section>

        <section id="c">
            <h4>Hp stat<i class="fa-solid fa-heart-pulse"></i></h4>
            <div id="stat1"></div>
        </section>

        <section id="d">
            <h4>Attack stat<i class="fa-solid fa-hand-fist"></i></h4>
            <div id="stat2"></div>
        </section>

        <section id="e">
            <h4>Speed stat<i class="fa-solid fa-shoe-prints"></i></h4>
            <div id="stat3"></div>
        </section>

        <section id="f">
            <h4>Type<i class="fa-solid fa-file-circle-question"></i></h4>
            <div id="type1"></div>
        </section>

        <section id="g">
            <h4>Moves<i class="fa-solid fa-qrcode"></i></h4>
            <div id="move1"></div>
            <div id="move2"></div>
            <div id="move3"></div>
            <div id="move4"></div>
            <div id="move5"></div>
            <div id="move6"></div>
            <div id="move7"></div>
            <div id="move8"></div>
            <div id="move9"></div>
            <div id="move10"></div>
        </section>

        <section id="h">
            <h4>Weight<i class="fa-solid fa-weight-hanging"></i></h4>
            <div id="weight1"></div>
        </section>

        <section id="i">
            <h4>Height<i class="fa-solid fa-ruler-vertical"></i></h4>
            <div id="height1"></div>
        </section>

    </main>
</body>
</html>
